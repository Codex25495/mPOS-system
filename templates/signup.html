<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zuri Sands Hotel - Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/signup.css') }}">
</head>
<body>
    <div class="signup-container">
        <div class="logo-section">
            <div class="logo-icon">🏨</div>
            <h1>Zuri <span>Sands</span></h1>
            <p>Hotel Management System</p>
        </div>

        <div class="welcome-text">
            <h2>Create your account</h2>
            <p>Request access to manage hotel operations</p>
        </div>

        <div id="errorMessage" class="error-message">
            <span>⚠️</span>
            <span id="errorText">Error message</span>
        </div>

        <div id="successMessage" class="success-message">
            <span>✅</span>
            <span id="successText">Success!</span>
        </div>

        <form id="signupForm">
            <div class="form-group">
                <label>👤 Full Name</label>
                <input 
                    type="text" 
                    id="fullName" 
                    placeholder="Enter your full name" 
                    required
                >
            </div>

            <div class="form-group">
                <label>📧 Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    placeholder="Enter your email" 
                    required
                >
            </div>

            <div class="form-group">
                <label>👤 Username</label>
                <input 
                    type="text" 
                    id="username" 
                    placeholder="Choose a username" 
                    required
                >
            </div>

            <div class="form-group">
                <label>📱 Phone Number</label>
                <input 
                    type="tel" 
                    id="phone" 
                    placeholder="Enter your phone number" 
                    required
                >
            </div>

            <div class="form-group">
                <label>🎯 Role</label>
                <select id="role" required>
                    <option value="">Select your role</option>
                    <option value="admin">Administrator</option>
                    <option value="waiter">Waiter / Server</option>
                    <option value="kitchen">Kitchen Staff</option>
                    <option value="bar">Bar Staff</option>
                    <option value="cashier">Cashier</option>
                </select>
            </div>

            <button type="submit" class="signup-btn" id="signupBtn">
                Request Access →
            </button>
        </form>

        <div class="divider">
            <span>Already have an account?</span>
        </div>

        <div class="login-link">
            <p><a id="loginLink">Sign in</a> to your account</p>
        </div>

        <div class="footer">
            <span>© 2026 Zuri Sands Hotel</span> • <span>Secure Signup</span>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/signup.js') }}"></script>
</body>
</html>
