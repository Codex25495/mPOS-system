<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Zuri Sands</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            position: relative;
            overflow-y: auto;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('https://images.unsplash.com/photo-1566073771259-6a8506099945?w=1920&q=80');
            background-size: cover;
            background-position: center;
            z-index: 0;
            filter: brightness(0.5);
            animation: zoomIn 20s ease-in-out infinite alternate;
        }

        @keyframes zoomIn {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, 
                rgba(0, 0, 0, 0.8) 0%,
                rgba(0, 0, 0, 0.5) 50%,
                rgba(0, 0, 0, 0.8) 100%);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 40px 35px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
            animation: slideUp 0.6s ease;
            max-height: 95vh;
            overflow-y: auto;
        }

        .container::-webkit-scrollbar {
            width: 4px;
        }
        .container::-webkit-scrollbar-track {
            background: transparent;
        }
        .container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 12px;
            box-shadow: 0 12px 30px rgba(102, 126, 234, 0.3);
        }

        .logo-section h1 {
            font-size: 24px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .logo-section h1 span {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-section p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            font-weight: 400;
            margin-top: 4px;
            letter-spacing: 0.3px;
        }

        .welcome-text {
            text-align: center;
            margin-bottom: 24px;
        }

        .welcome-text h2 {
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
        }

        .welcome-text p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-group input:focus {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .verification-section {
            display: none;
            animation: slideDown 0.4s ease;
        }

        .verification-section.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                max-height: 0;
            }
            to {
                opacity: 1;
                max-height: 500px;
            }
        }

        .code-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .code-inputs input {
            width: 50px;
            height: 55px;
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            padding: 0;
        }

        .code-inputs input:focus {
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(102, 126, 234, 0.35);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: none;
        }

        .btn-success {
            background: #10b981;
        }

        .message {
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 12px;
            margin-bottom: 16px;
            display: none;
            align-items: center;
            gap: 8px;
            animation: shake 0.4s ease;
        }

        .message.show {
            display: flex;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .message.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .resend-timer {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            margin-top: 12px;
        }

        .resend-timer a {
            color: #667eea;
            cursor: pointer;
            text-decoration: none;
        }

        .resend-timer a:hover {
            text-decoration: underline;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.15);
            font-size: 11px;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 12px;
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            font-size: 13px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: rgba(255, 255, 255, 0.6);
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px 20px;
            }
            .code-inputs input {
                width: 45px;
                height: 50px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <div class="logo-icon">🔑</div>
            <h1>Zuri <span>Sands</span></h1>
            <p>Hotel Management System</p>
        </div>

        <div class="welcome-text">
            <h2>Reset Password</h2>
            <p>Enter your phone number to receive a verification code</p>
        </div>

        <div id="message" class="message">
            <span id="messageIcon">⚠️</span>
            <span id="messageText">Error message</span>
        </div>

        <!-- Step 1: Phone Number -->
        <div id="step1">
            <div class="form-group">
                <label>📱 Phone Number</label>
                <input 
                    type="tel" 
                    id="phone" 
                    placeholder="Enter your phone number" 
                    required
                >
            </div>
            <button class="btn" id="sendCodeBtn">
                Send Verification Code →
            </button>
        </div>

        <!-- Step 2: Verification Code + New Password -->
        <div id="step2" class="verification-section">
            <div class="form-group">
                <label>🔑 Enter 4-Digit Code</label>
                <div class="code-inputs">
                    <input type="text" maxlength="1" class="code-input" id="code1" required>
                    <input type="text" maxlength="1" class="code-input" id="code2" required>
                    <input type="text" maxlength="1" class="code-input" id="code3" required>
                    <input type="text" maxlength="1" class="code-input" id="code4" required>
                </div>
            </div>

            <div class="form-group">
                <label>🔒 New Password</label>
                <input 
                    type="password" 
                    id="newPassword" 
                    placeholder="Enter new password (min 4 characters)" 
                    minlength="4"
                    required
                >
            </div>

            <button class="btn" id="resetBtn">
                Reset Password →
            </button>

            <div class="resend-timer">
                Didn't receive code? <a id="resendCode">Resend in <span id="timer">30</span>s</a>
            </div>

            <button class="btn btn-secondary" id="backBtn">
                ← Back
            </button>
        </div>

        <a href="/login" class="back-link">← Back to Login</a>

        <div class="footer">
            <span>© 2026 Zuri Sands Hotel</span> • <span>Secure Reset</span>
        </div>
    </div>

    <script>
        // DOM Elements
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const phoneInput = document.getElementById('phone');
        const sendCodeBtn = document.getElementById('sendCodeBtn');
        const resetBtn = document.getElementById('resetBtn');
        const newPasswordInput = document.getElementById('newPassword');
        const backBtn = document.getElementById('backBtn');
        const resendCode = document.getElementById('resendCode');
        const timerSpan = document.getElementById('timer');
        const message = document.getElementById('message');
        const messageText = document.getElementById('messageText');
        const messageIcon = document.getElementById('messageIcon');

        // Code inputs
        const codeInputs = document.querySelectorAll('.code-input');
        let verificationCode = '';
        let timerInterval = null;
        let timerSeconds = 30;
        let phoneNumber = '';

        // Auto-focus next code input
        codeInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < 3) {
                    codeInputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && index > 0 && e.target.value === '') {
                    codeInputs[index - 1].focus();
                }
            });
        });

        // Show message
        function showMessage(text, type) {
            message.className = 'message show ' + type;
            messageText.textContent = text;
            messageIcon.textContent = type === 'error' ? '⚠️' : '✅';
            setTimeout(() => {
                message.classList.remove('show');
            }, 5000);
        }

        // Send verification code
        sendCodeBtn.addEventListener('click', async () => {
            const phone = phoneInput.value.trim();

            if (!phone) {
                showMessage('Please enter your phone number', 'error');
                return;
            }

            if (phone.length < 10) {
                showMessage('Please enter a valid phone number', 'error');
                return;
            }

            sendCodeBtn.disabled = true;
            sendCodeBtn.innerHTML = '<span class="spinner"></span> Sending...';

            try {
                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ phone })
                });

                const data = await response.json();

                if (data.success) {
                    phoneNumber = phone;
                    verificationCode = data.code;
                    showMessage('📱 Verification code sent to your phone!', 'success');
                    
                    // Show step 2
                    step1.style.display = 'none';
                    step2.classList.add('show');
                    codeInputs[0].focus();
                    startTimer();
                } else {
                    showMessage(data.message || 'Phone number not found', 'error');
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
            } finally {
                sendCodeBtn.disabled = false;
                sendCodeBtn.innerHTML = 'Send Verification Code →';
            }
        });

        // Reset password
        resetBtn.addEventListener('click', async () => {
            const code = Array.from(codeInputs).map(input => input.value).join('');
            const newPassword = newPasswordInput.value.trim();

            if (code.length !== 4) {
                showMessage('Please enter the 4-digit verification code', 'error');
                return;
            }

            if (!newPassword || newPassword.length < 4) {
                showMessage('Password must be at least 4 characters', 'error');
                return;
            }

            resetBtn.disabled = true;
            resetBtn.innerHTML = '<span class="spinner"></span> Resetting...';

            try {
                const response = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        phone: phoneNumber,
                        code: code,
                        new_password: newPassword
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('✅ Password reset successfully! Redirecting to login...', 'success');
                    resetBtn.classList.add('btn-success');
                    resetBtn.innerHTML = '✅ Password Reset!';
                    
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    showMessage(data.message || 'Invalid code. Please try again.', 'error');
                    codeInputs.forEach(input => input.value = '');
                    codeInputs[0].focus();
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
            } finally {
                resetBtn.disabled = false;
                resetBtn.innerHTML = 'Reset Password →';
            }
        });

        // Back button
        backBtn.addEventListener('click', () => {
            step2.classList.remove('show');
            step1.style.display = 'block';
            codeInputs.forEach(input => input.value = '');
            newPasswordInput.value = '';
            clearInterval(timerInterval);
            message.classList.remove('show');
        });

        // Resend code
        resendCode.addEventListener('click', () => {
            if (timerSeconds === 0) {
                sendCodeBtn.click();
            }
        });

        // Timer
        function startTimer() {
            timerSeconds = 30;
            timerSpan.textContent = timerSeconds;
            clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                timerSeconds--;
                timerSpan.textContent = timerSeconds;
                if (timerSeconds <= 0) {
                    clearInterval(timerInterval);
                    timerSpan.textContent = '0';
                    resendCode.style.color = '#667eea';
                    resendCode.innerHTML = 'Resend Code';
                }
            }, 1000);
        }

        // Enter key support
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (step2.classList.contains('show')) {
                    resetBtn.click();
                } else {
                    sendCodeBtn.click();
                }
            }
        });

        // Focus on phone input on load
        window.addEventListener('load', () => {
            phoneInput.focus();
        });
    </script>
</body>
</html>
