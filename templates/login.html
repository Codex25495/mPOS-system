<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zuri Sands Hotel - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <div class="logo-icon">🏨</div>
            <h1>Zuri <span>Sands</span></h1>
            <p>Hotel Management System</p>
        </div>

        <div class="welcome-text">
            <h2>Welcome back</h2>
            <p>Sign in to manage your hotel operations</p>
        </div>

        <div id="errorMessage" class="error-message">
            <span class="icon">⚠️</span>
            <span id="errorText">Invalid credentials</span>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>📧 Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    placeholder="Enter your email" 
                    value=""
                    required>
            </div>

            <div class="form-group">
                <label>🔒 Password</label>
                <div class="password-wrapper">
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Enter your password" 
                        value=""
                    >
                    <button type="button" class="toggle-password" id="togglePassword">👁️</button>
                </div>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                Log In →
            </button>
        </form>

        <div class="links-row">
            <a id="forgotPassword">Forgot password?</a>
            <a id="helpLink">Need help?</a>
        </div>

        <div class="divider">
            <span>New to Zuri Sands?</span>
        </div>

        <!-- SIGN UP BUTTON -->
        <div class="signup-btn-container">
            <button class="signup-btn" id="signupBtn">
                📝 Create New Account →
            </button>
        </div>

        <div class="footer">
            <span>© 2026 Zuri Sands Hotel</span> • <span>Secure Login</span>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
